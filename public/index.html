<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>Customer Support</h1>
      <p>Ask me anything about our products and services</p>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot-message">
        <div class="message-content">Hello! How can I help you today? Ask me about shipping, returns, payments, or anything else.</div>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
